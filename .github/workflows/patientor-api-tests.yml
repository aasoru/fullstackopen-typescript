name: Patientor API Tests

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            patientor/backend/package-lock.json
            patientor-api-tests/package-lock.json

      - name: Install patientor backend dependencies
        working-directory: ./patientor/backend
        run: npm ci

      - name: Lint patientor backend
        working-directory: ./patientor/backend
        run: npm run lint

      - name: Install test dependencies
        working-directory: ./patientor-api-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./patientor-api-tests
        run: npx playwright install --with-deps chromium

      - name: Start patientor backend server
        working-directory: ./patientor/backend
        run: npm start > /tmp/server.log 2>&1 &

      - name: Wait for server to be ready
        working-directory: ./patientor-api-tests
        run: npx wait-on http://localhost:3001/api/ping --timeout 30000 || (echo "=== SERVER LOG ===" && cat /tmp/server.log && exit 1)

      - name: Run API tests
        working-directory: ./patientor-api-tests
        run: npm test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: patientor-api-tests/playwright-report/
          retention-days: 30

      - name: Stop patientor backend server
        if: always()
        run: pkill -f "node.*index.ts" || true
